name: Generate & Deploy (no scrape)

# ───────────────────────────────────────────────────────────────────────────
# يُشغَّل تلقائياً عند كل push على main (لنشر تغييرات الكود فوراً)
# + يدوياً عند الحاجة.
# الغرض: إعادة توليد الـ HTML ونشره بدون انتظار دورة الكشط (6 ساعات).
# الوقت المتوقع: ~3-5 دقائق.
#
# نفس فلسفة التحصين: Verify gate قبل النشر يمنع نشر موقع مكسور.
# ───────────────────────────────────────────────────────────────────────────
on:
  push:
    branches: [main]
    paths:
      - 'generate_site.py'
      - 'config/**.json'
      - 'static/style.css'
      - 'static/app.js'
      - '.github/workflows/generate-and-deploy.yml'
  workflow_dispatch:

# مجموعة منفصلة عن الـ workflow المجدول؛ آخر تشغيل يدوي يفوز
concurrency:
  group: manual-generate
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  generate-and-deploy:
    name: Generate → Verify → Deploy (skip scrape)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. تنزيل الكود ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. تثبيت Python 3.12 ──────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # ── 3. تثبيت المكتبات ─────────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. استعادة قواعد البيانات (read-only — لا كشط هنا) ───────────
      #    ⚠️ حرج: key يستخدم run_id (فريد عام) لا run_number. السبب: run_number
      #    خاص بكل workflow ويتكرر — كان key=news-databases-{رقم السريع} يطابق
      #    تماماً كاشاً قديماً جداً أنشأه الـ workflow الكامل بنفس الرقم، فتُستعاد
      #    DB قديمة وتختفي العناوين الحديثة (>7 أيام تُفلتر). run_id لا يطابق
      #    exact أبداً → دائماً يسقط لـ restore-keys → يأخذ أحدث كاش من الكامل.
      - name: Restore news databases cache
        uses: actions/cache/restore@v4
        with:
          path: data/
          key: news-databases-${{ github.run_id }}
          restore-keys: |
            news-databases-

      # ── 4b. فحص رسالة الـ commit — تحصين ضد الأحرف غير ASCII ──────────
      - name: Warn on non-ASCII commit message
        continue-on-error: true
        run: |
          MSG=$(git log -1 --pretty=%B)
          python3 -c "
          import sys
          msg = '''$MSG'''
          try:
              msg.encode('ascii')
              print('Commit message is ASCII-safe.')
          except UnicodeEncodeError:
              print('WARNING: Commit message contains non-ASCII characters.')
              print('  Safe (wrangler uses SHA), but violates project conventions.')
              print(f'  Message: {msg[:80]}')
          "

      # ── 5. ضمان وجود مجلد data/ ───────────────────────────────────────
      - name: Ensure data directory exists
        run: mkdir -p data

      # ── 5b. تشخيص: إظهار نضارة قواعد البيانات بعد الاستعادة ──────────
      - name: Show database freshness
        continue-on-error: true
        run: |
          for db in data/*.db; do
            [ -f "$db" ] || continue
            python -c "import sqlite3,sys; c=sqlite3.connect('$db'); r=c.execute('SELECT COUNT(*), MAX(scraped_at) FROM articles').fetchone(); print(f'  $db → {r[0]} articles, newest: {r[1]}')" 2>/dev/null || echo "  $db → (no articles table)"
          done

      # ── 6. توليد الموقع فقط (بدون كشط أخبار جديدة) ────────────────────
      - name: Generate site (--generate-only)
        run: python run.py --generate-only

      # ── 7. بوابة التحقق — تمنع نشر موقع ناقص أو مكسور ─────────────────
      - name: Verify build output
        run: |
          echo "🔍 Verifying generated site…"
          fail() { echo "❌ $1"; exit 1; }
          [ -s static/index.html ] || fail "static/index.html missing/empty"
          [ -s static/style.css ]  || fail "static/style.css missing/empty"
          [ -s static/app.js ]     || fail "static/app.js missing/empty"
          for d in ar fr es tr pt; do
            [ -s "static/$d/index.html" ] || fail "static/$d/index.html missing/empty"
          done
          size=$(stat -c%s static/index.html)
          [ "$size" -gt 5000 ] || fail "index.html too small ($size bytes)"
          # عدد بطاقات المقالات — يمنع نشر موقع شبه فارغ (DB قديمة/كشط متوقف)
          cards=$(grep -o 'class="article-card' static/index.html | wc -l)
          [ "$cards" -ge 8 ] || fail "homepage has only $cards article cards — DB stale/empty, refusing to deploy"
          [ -s static/sitemap.xml ] || fail "sitemap.xml missing"
          [ -s static/robots.txt ]  || fail "robots.txt missing"
          echo "✅ Build verified — all critical files present (index.html: ${size} bytes)"

      # ── 8. النشر على Cloudflare Pages — فقط بعد نجاح Verify ───────────
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:        ${{ secrets.CF_API_TOKEN }}
          accountId:       ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy static --project-name=${{ secrets.CF_PROJECT_NAME }} --commit-dirty=true --commit-message="deploy ${{ github.sha }}"

      # ── 9. ملخص النشر ─────────────────────────────────────────────────
      - name: Print deployment summary
        if: success()
        run: |
          echo "✅ Site generated & deployed successfully!"
          echo "🌐 Visit: https://${{ secrets.CF_PROJECT_NAME }}.pages.dev"
