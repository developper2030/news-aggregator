name: Update & Deploy News Site

# ───────────────────────────────────────────────────────────────────────────
# متى يعمل؟  كل 6 ساعات (00/06/12/18 UTC) + يدوياً عند الحاجة.
#
# فلسفة التحصين (ضمان وصول التحديثات إلى Cloudflare دائماً):
#   1. الكشط/التلخيص "best-effort": مسموح له بالفشل/التأخّر دون إيقاف النشر.
#   2. التوليد يعمل من بيانات الكاش الموجودة → يلتقط أحدث تعديلات الكود دوماً.
#   3. بوابة Verify تتحقق من سلامة المخرجات قبل النشر (تمنع نشر موقع مكسور).
#   4. النشر يحدث فقط بعد نجاح Verify (لا نشر أعمى لموقع ناقص).
# ───────────────────────────────────────────────────────────────────────────
on:
  schedule:
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:

# منع تداخل عدة runs مجدولة معاً (لا نُلغي كشطاً جارياً — ننتظره)
concurrency:
  group: scheduled-update
  cancel-in-progress: false

# مبدأ الحد الأدنى من الصلاحيات
permissions:
  contents: read

jobs:
  build-and-deploy:
    name: Scrape → Generate → Verify → Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 75

    steps:
      # ── 1. تنزيل الكود ────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. تثبيت Python 3.12 ──────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # ── 3. تثبيت المكتبات (مع ترقية pip لتجنب أعطال التوافق) ──────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ── 4. استعادة قواعد البيانات من الـ cache (read + write) ────────
      #    key يستخدم run_id (فريد عبر كل الـ repo) لا run_number (يتكرر بين
      #    الـ workflows ويسبب exact-match خاطئ لكاش قديم). دائماً key جديد →
      #    يُحفظ كاش جديد كل run؛ والاستعادة الأولية عبر restore-keys = الأحدث.
      - name: Restore news databases cache
        uses: actions/cache@v4
        with:
          path: data/
          key: news-databases-${{ github.run_id }}
          restore-keys: |
            news-databases-

      # ── 4b. فحص رسالة الـ commit — تحصين ضد الأحرف غير ASCII ──────────
      #    Cloudflare Pages API يرفض الأحرف غير ASCII [code: 8000111].
      #    هذا الفحص يُنبّه فقط (warning) — لن يوقف النشر لأن wrangler
      #    يستخدم --commit-message="deploy SHA" بدلاً من رسالة git.
      - name: Warn on non-ASCII commit message
        continue-on-error: true
        run: |
          MSG=$(git log -1 --pretty=%B)
          python3 -c "
          import sys
          msg = '''$MSG'''
          try:
              msg.encode('ascii')
              print('Commit message is ASCII-safe.')
          except UnicodeEncodeError:
              print('WARNING: Commit message contains non-ASCII characters.')
              print('  This is safe (wrangler uses SHA as commit-message),')
              print('  but violates project conventions. Use ASCII only.')
              print(f'  Message: {msg[:80]}')
          "

      # ── 5. ضمان وجود مجلد data/ ───────────────────────────────────────
      - name: Ensure data directory exists
        run: mkdir -p data

      # ── 5b. تشخيص: إظهار نضارة قواعد البيانات بعد الاستعادة ──────────
      - name: Show database freshness
        continue-on-error: true
        run: |
          for db in data/*.db; do
            [ -f "$db" ] || continue
            python -c "import sqlite3,sys; c=sqlite3.connect('$db'); r=c.execute('SELECT COUNT(*), MAX(scraped_at) FROM articles').fetchone(); print(f'  $db → {r[0]} articles, newest: {r[1]}')" 2>/dev/null || echo "  $db → (no articles table)"
          done

      # ── 6. الكشط + التلخيص — best-effort (لا يمنع النشر إن فشل/تأخّر) ──
      #    timeout على مستوى الخطوة (50 د) + continue-on-error:
      #    إن تجاوز الوقت أو فشل، تُقتل الخطوة وحدها والـ job يكمل.
      - name: Scrape & summarize (best-effort)
        timeout-minutes: 50
        continue-on-error: true
        run: python run.py
        env:
          METALPRICEAPI_KEY:   ${{ secrets.METALPRICEAPI_KEY }}
          ALPHAVANTAGE_KEY:    ${{ secrets.ALPHAVANTAGE_KEY }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY:  ${{ secrets.OPENROUTER_API_KEY }}
          NVIDIA_API_KEY:      ${{ secrets.NVIDIA_API_KEY }}

      # ── 6c. نسخ احتياطي دائم لقواعد البيانات (artifact، 30 يوماً) ─────
      #    شبكة أمان ضد فقدان الكاش المؤقت. إن ضاعت كل الكاشات، نزّل آخر
      #    artifact من تبويب Actions → استخرجه إلى data/ → استعدت كل المقالات.
      - name: Backup databases (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: news-databases-backup
          path: data/*.db
          retention-days: 30
          if-no-files-found: warn

      # ── 7. توليد الموقع من بيانات الكاش — يلتقط أحدث تعديلات الكود ────
      #    لا continue-on-error: إن فشل التوليد (خطأ كود) نوقف قبل النشر.
      - name: Generate site
        run: python run.py --generate-only

      # ── 8. بوابة التحقق — تمنع نشر موقع ناقص أو مكسور ─────────────────
      - name: Verify build output
        run: |
          echo "🔍 Verifying generated site…"
          fail() { echo "❌ $1"; exit 1; }
          # الصفحة الرئيسية الإنجليزية (الجذر) + الأصول الأساسية
          [ -s static/index.html ] || fail "static/index.html missing/empty"
          [ -s static/style.css ]  || fail "static/style.css missing/empty"
          [ -s static/app.js ]     || fail "static/app.js missing/empty"
          # صفحات اللغات الأربع الأخرى
          for d in ar fr es tr; do
            [ -s "static/$d/index.html" ] || fail "static/$d/index.html missing/empty"
          done
          # حجم معقول للصفحة الرئيسية (> 5KB يعني محتوى حقيقي لا صفحة خطأ)
          size=$(stat -c%s static/index.html)
          [ "$size" -gt 5000 ] || fail "index.html too small ($size bytes)"
          # عدد بطاقات المقالات — يمنع نشر موقع شبه فارغ (DB قديمة/كشط متوقف)
          cards=$(grep -o 'class="article-card' static/index.html | wc -l)
          [ "$cards" -ge 8 ] || fail "homepage has only $cards article cards — DB stale/empty, refusing to deploy"
          # ملفات SEO الحرجة
          [ -s static/sitemap.xml ] || fail "sitemap.xml missing"
          [ -s static/robots.txt ]  || fail "robots.txt missing"
          echo "✅ Build verified — all critical files present (index.html: ${size} bytes)"

      # ── 9. النشر على Cloudflare Pages — فقط بعد نجاح Verify ───────────
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:        ${{ secrets.CF_API_TOKEN }}
          accountId:       ${{ secrets.CF_ACCOUNT_ID }}
          command: pages deploy static --project-name=${{ secrets.CF_PROJECT_NAME }} --commit-dirty=true --commit-message="deploy ${{ github.sha }}"

      # ── 10. ملخص النشر ────────────────────────────────────────────────
      - name: Print deployment summary
        if: success()
        run: |
          echo "✅ Site deployed successfully!"
          echo "🌐 Visit: https://${{ secrets.CF_PROJECT_NAME }}.pages.dev"
