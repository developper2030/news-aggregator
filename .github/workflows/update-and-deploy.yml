name: Update & Deploy News Site

# ───────────────────────────────────────────────
# متى يعمل هذا الـ workflow؟
# ───────────────────────────────────────────────
on:
  schedule:
    # كل 6 ساعات: 00:00 / 06:00 / 12:00 / 18:00 UTC
    - cron: '0 0,6,12,18 * * *'
  workflow_dispatch:
    # تشغيل يدوي من GitHub عند الحاجة (زر "Run workflow")

jobs:
  build-and-deploy:
    name: Scrape → Generate → Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 75
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      # ── 1. تنزيل الكود من GitHub ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. تثبيت Python 3.12 ──────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      # ── 3. تثبيت المكتبات (beautifulsoup4, lxml...) ───────────────────
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 4. استعادة قواعد البيانات من الـ cache ───────────────────────
      #    (حتى لا نفقد الأخبار القديمة في كل run)
      - name: Restore news databases cache
        uses: actions/cache@v4
        with:
          path: data/
          key: news-databases-${{ github.run_number }}
          restore-keys: |
            news-databases-

      # ── 5. إنشاء مجلد data/ إذا لم يكن موجوداً ──────────────────────
      - name: Ensure data directory exists
        run: mkdir -p data

      # ── 6. الكشط + الملخصات (قد يتأخّر/يفشل — لا يمنع النشر) ──────────
      #    timeout على مستوى الخطوة (50 د): إذا تجاوزها تُقتل الخطوة وحدها
      #    لكن الـ job يستمر للخطوات التالية (generate + deploy).
      - name: Scrape & summarize (best-effort)
        timeout-minutes: 50
        continue-on-error: true
        run: python run.py
        env:
          # مفاتيح API الاختيارية (تُضاف في GitHub Secrets)
          METALPRICEAPI_KEY:   ${{ secrets.METALPRICEAPI_KEY }}
          ALPHAVANTAGE_KEY:    ${{ secrets.ALPHAVANTAGE_KEY }}
          GROQ_API_KEY:        ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY:      ${{ secrets.GEMINI_API_KEY }}
          OPENROUTER_API_KEY:  ${{ secrets.OPENROUTER_API_KEY }}
          NVIDIA_API_KEY:      ${{ secrets.NVIDIA_API_KEY }}

      # ── 6b. توليد الموقع — يعمل دائماً حتى لو فشل/تأخّر الكشط ────────
      #    يضمن نشر آخر تعديلات الكود (CSS/HTML) من بيانات الكاش الموجودة.
      - name: Generate site (always runs)
        if: always()
        run: python run.py --generate-only

      # ── 7. نشر الموقع على Cloudflare Pages — يعمل دائماً ──────────────
      - name: Deploy to Cloudflare Pages
        if: always()
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken:       ${{ secrets.CF_API_TOKEN }}
          accountId:      ${{ secrets.CF_ACCOUNT_ID }}
          wranglerVersion: '3'
          command: pages deploy static --project-name=${{ secrets.CF_PROJECT_NAME }} --commit-dirty=true

      # ── 8. طباعة رابط الموقع بعد النشر ──────────────────────────────
      - name: Print deployment summary
        run: |
          echo "✅ Site deployed successfully!"
          echo "🌐 Visit: https://${{ secrets.CF_PROJECT_NAME }}.pages.dev"
