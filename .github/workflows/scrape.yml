name: Daily News Scrape

on:
  schedule:
    - cron: "47 6 * * *"  # Every day at 06:47 UTC
  workflow_dispatch:        # Manual trigger

permissions:
  contents: write

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          python -c "import bs4; print('BeautifulSoup', bs4.__version__)"

      - name: Run tests
        run: python -m pytest tests/ -v

      - name: Run scraper
        run: python scraper/scrape.py

      - name: Generate site
        run: python generate_site.py

      - name: Commit and push updates
        run: |
          git config user.name "news-aggregator-bot"
          git config user.email "bot@localhost"
          git add data/ static/
          git diff --quiet && git diff --staged --quiet || \
            git commit -m "chore: daily news update $(date +%Y-%m-%d)"
          git push || echo "Push failed (may need to configure permissions)"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::warning::News scrape pipeline failed. Check the logs above."
